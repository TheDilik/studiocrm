services:
  postgres:
    image: postgres:16-alpine
    container_name: studiocrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: studiocrm
      POSTGRES_PASSWORD: studiocrm
      POSTGRES_DB: studiocrm
    ports:
      - "5432:5432"
    volumes:
      - studiocrm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studiocrm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  studiocrm_pgdata:
